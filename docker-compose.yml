name: cms-admin-ruby-ssr

services:
  app:
    container_name: cms-admin-ruby-ssr
    build: .
    ports:
      - "5016:5016"
    extra_hosts:
      - "host.docker.internal:host-gateway"
    environment:
      PORT: "5016"
      API_BASE_URL: "${API_BASE_URL:-http://host.docker.internal:3016}"
      COOKIE_SECURE: "${COOKIE_SECURE:-false}"
